# Compare DeepSeek V3.1: With LMCache vs Without LMCache
name: "LMCache Performance Comparison - 64 Concurrency"
description: "High concurrency benchmark comparing DeepSeek V3.1 with LMCache (160.72.54.251) vs without LMCache (160.72.54.241)"

# Default model (can be overridden per provider)
model: "deepseek-ai/DeepSeek-V3.1"

providers:
  - name: "without-lmcache"
    base_url: "http://160.72.54.241:8000/v1"
    api_key: "${NEARAI_API_KEY}"
    # Uses default model: deepseek-ai/DeepSeek-V3.1

  - name: "with-lmcache"
    base_url: "http://160.72.54.251:8000/v1"
    api_key: "${NEARAI_API_KEY}"
    # Uses default model: deepseek-ai/DeepSeek-V3.1

dataset:
  type: sharegpt
  # Will auto-download from HuggingFace if not cached
  # Or specify local path: path: "/path/to/sharegpt.json"
  skip: 0

num_requests: 1000
concurrency: 64
rps: 32
max_tokens: 10000
timeout_secs: 600
